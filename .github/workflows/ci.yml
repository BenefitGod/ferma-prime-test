name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make

      - name: Build program
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ferma-test
          path: ferma-test
          retention-days: 1

    docker:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ferma-test
          path: .

      - name: Make binary executable
        run: chmod +x ferma-test

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ferma-test:latest

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ferma-test:latest

      - name: Save Docker image as artifact (backup)
        run: docker save ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }} -o ferma-test.tar