name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make

      - name: Build program
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ferma-test
          path: ferma-test
          retention-days: 1

  docker:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ferma-test
          path: .

      - name: Make binary executable
        run: chmod +x ferma-test

      - name: Build Docker image
        run: docker build -t ferma-test:latest .

      - name: Save Docker image
        run: docker save ferma-test:latest -o ferma-test.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ferma-test.tar
          retention-days: 1