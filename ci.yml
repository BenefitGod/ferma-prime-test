name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Джоб 1: Сборка приложения
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make

      - name: Build program
        run: make

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferma-test
          path: ferma-test
          retention-days: 1

  # Джоб 2: Тестирование
  test:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ferma-test
          path: .

      - name: Make binary executable
        run: chmod +x ferma-test

      - name: Run tests
        run: |
          if [ -f "tests/test_ferma.cpp" ]; then
            g++ -o test_runner tests/test_ferma.cpp -Iinclude
            ./test_runner
          else
            echo "No tests found, skipping..."
          fi

  # Джоб 3: Сборка Docker образа и публикация в Docker Hub
  docker:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ferma-test:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ferma-test:latest

      - name: Save Docker image as artifact
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/ferma-test:${{ github.sha }} -o ferma-test-image.tar
          gzip ferma-test-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ferma-test-image.tar.gz
          retention-days: 7